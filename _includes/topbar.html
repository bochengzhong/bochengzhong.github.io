{% assign lang = page.lang | default: 'en' %}
{% assign copy = site.data[lang].home %}
<div class="topbar">
  <nav class="topbar__nav" aria-label="{{ copy.topbar.nav_aria_label }}">
    {% for item in copy.topbar.nav %}
    <a class="topbar__link" href="{{ item.href }}">{{ item.label | escape_once }}</a>
    {% endfor %}
  </nav>
  <div class="topbar__meta">
    <div class="topbar__languages" role="group" aria-label="{{ copy.topbar.language_label }}">
      {% for language in copy.topbar.languages %}
      <a class="topbar__pill{% if language.code == lang %} is-active{% endif %}" href="{{ language.href | relative_url }}" lang="{{ language.code }}"{% if language.code == lang %} aria-current="page"{% endif %}>
        {{ language.label | escape_once }}
      </a>
      {% endfor %}
    </div>
    {% include switch.html %}
  </div>
</div>
