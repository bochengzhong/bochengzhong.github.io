{% assign lang = page.lang | default: 'en' %}
{% assign copy = site.data[lang].home %}
<a class="status" href="{{ site.resume | relative_url }}" target="_blank">
  <div class="status__light">
    <div class="status__light__ring"></div>
    <div class="status__light__led"></div>
  </div>
  <div class="status__message">{{ copy.employment_status.message | escape_once }}</div>
</a>
