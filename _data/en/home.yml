experience:
  title: Experience
  resume_label: ""
  jobs:
    - company: Insta360
      url: https://www.insta360.com/
      time: Shenzhen, China | Aug 2025 - Nov 2025
      position: Worked on audio hardware evaluation and validation for camera-related products, including microphones, speakers, codecs, and amplifiers. Also supported wind-noise investigation, interference testing, and multi-scenario validation. Contributed to comparing materials, structures, and accessory solutions in practical product contexts, and gained experience collaborating across hardware-related development and testing workflows.
    - company: Hikvision
      url: https://www.hikvision.com/
      time: Hangzhou, China | Jun 2025 - Aug 2025
      position: Worked on component testing, acoustic integration, and system validation across multiple product types, with hands-on experience in tuning, debugging, and performance analysis. This experience strengthened my understanding of how component behavior, structure, and system-level requirements come together in real product development.
featured_projects:
  title: Project
  items:
    - class_name: hearing-material
      layout: gallery
      name_html: >-
        <a href="https://ieeexplore.ieee.org/document/11236101" target="_blank" rel="noreferrer">Hearing Material</a> /
        <a href="https://ieeexplore.ieee.org/document/10972862" target="_blank" rel="noreferrer">Auditory Materiality</a>:
        Dynamic Auditory Feedback for Material Perception in VR
      url: https://doi.org/10.1109/ISMAR-Adjunct68609.2025.00127
      description: >-
        A two-stage project exploring how dynamic sound can create the illusion of touching
        different materials in VR. The work grew from an early prototype into a more complete
        interactive system, resulting in 2 conference publications and 1 Chinese invention patent
        publication.
      images:
        - src: /img/bc_figures/hearing_material/1.JPG
          alt: Hearing Material figure 1
        - src: /img/bc_figures/hearing_material/2.JPG
          alt: Hearing Material figure 2
        - src: /img/bc_figures/hearing_material/3.png
          alt: Hearing Material figure 3
        - src: /img/bc_figures/hearing_material/4.png
          alt: Hearing Material figure 4
        - src: /img/bc_figures/hearing_material/5.jpg
          alt: Hearing Material figure 5
        - src: /img/bc_figures/hearing_material/6.png
          alt: Hearing Material figure 6
    - class_name: virtual-concert
      layout: gallery
      name: Sound Field Reproduction for Virtual Concerts
      url: https://soundstudiesgroup.net/
      description: >-
        A research project on immersive spatial audio for virtual concert experiences, combining
        multichannel recording, spatial audio workflow, and VR integration.
      images:
        - src: /img/featured/virtual-concert/01-vr-jazz.png
          alt: Virtual concert jazz venue and simulation scene
        - src: /img/featured/virtual-concert/02-vr-music.png
          alt: Virtual concert spatial audio layout
        - src: /img/featured/virtual-concert/03-vr-music-3.png
          alt: Virtual concert venue recording context
