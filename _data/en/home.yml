  title: Background
  paragraphs:
    - >-
      My work combines hardware, prototyping, audio, sensing, and interaction. Audio is one of my
      strengths, but I am equally interested in how technology is built, validated, and shaped into
      real products.
    - >-
      Related groups:
      <a class="underline-link" href="https://soundstudiesgroup.net/" target="_blank" rel="noreferrer">Sound Studies Group</a>
      and
      <a class="underline-link" href="https://www.immersivedesignresearch.com/" target="_blank" rel="noreferrer">Immersive Design Group</a>.
    - >-
