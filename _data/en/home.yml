featured_projects:
  title: Featured Work
  items:
    - class_name: hearing-material
      layout: single
      name: "Hearing Material: VR Material Perception Through Audio"
      url: https://doi.org/10.1109/ISMAR-Adjunct68609.2025.00127
      description: >-
        Led system definition and prototype development for a VR interface that uses auditory feedback to simulate material
        texture. Built sensing and audio subsystems, designed validation studies, and translated user insight into an
        interactive concept that resulted in IEEE publications and a patent outcome.
      images:
        - src: /img/featured/hearing-material/teaser.png
          alt: Hearing Material prototype overview
    - class_name: audio-validation
      layout: single
      name: Camera Audio Hardware Validation at Insta360
      url: https://www.insta360.com/
      description: >-
        Supported component evaluation, wind-noise investigation, microphone layout analysis, and 10+ scenario validation
        for camera products. Worked across acoustic, mechanical, and software tradeoffs to improve real-world pickup quality.
      images:
        - src: /img/featured/audio-validation/recording.png
          alt: Audio hardware validation setup
    - class_name: flying-microphone
      layout: single
      name: Compact Flying Microphone for Conference Scenarios
      url: https://designschool.sustech.edu.cn/cn/research
      description: >-
        Contributed to a portable flying microphone concept for conference environments, focusing on foldable structure design,
        microphone array integration, and system-level debugging to improve interaction flexibility between speakers and audiences.
      images:
        - src: /img/featured/flying-microphone/exhibition.jpg
          alt: Prototype demonstration and exhibition
other_projects:
  title: Additional Experience
  items:
