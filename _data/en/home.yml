featured_projects:
  title: Selected Projects
  items:
    - class_name: hearing-material
      layout: single
      name: "Hearing Material: Dynamic Auditory Feedback for Material Perception in VR"
      url: https://doi.org/10.1109/ISMAR-Adjunct68609.2025.00127
      description: >-
        A two-stage project exploring how dynamic sound can create the illusion of touching
        different materials in VR. The work grew from an early prototype into a more complete
        interactive system, resulting in 2 conference publications and 1 Chinese invention patent
        publication.
      images:
        - src: /img/featured/hearing-material/teaser.png
          alt: Hearing Material prototype overview
    - class_name: virtual-concert
      layout: single
      name: Sound Field Reproduction for Virtual Concerts
      url: https://soundstudiesgroup.net/
      description: >-
        A research project on immersive spatial audio for virtual concert experiences, combining
        multichannel recording, spatial audio workflow, and VR integration.
      images:
        - src: /img/featured/virtual-concert/reality-virtual.png
          alt: Virtual concert and spatial audio project overview
    - class_name: wind-energy
      layout: single
      name: Triboelectric Nanogenerator-Based Wind Energy Harvesting System
      url: ""
      description: >-
        An undergraduate engineering project on low-power wind energy harvesting, involving
        structural design, simulation, and prototype testing.
      images:
        - src: /img/featured/wind-energy/prototype.png
          alt: Hardware prototype and test setup
