      url: https://www.immersivedesignresearch.com/
      description: >-
        Built working prototypes rather than concept slides, combining sensing boards, enclosures, validation rigs, and
        comparative testing to de-risk product ideas early and make product decisions with evidence.
      used:
        - Prototype building
        - Testing
        - Iteration
        - User validation
        - System integration
    - name: Cross-Scenario Hardware Exposure
      url: https://designschool.sustech.edu.cn/cn/research
      description: >-
        Built practical exposure across consumer audio, action cameras, AI hardware, and adjacent automotive contexts, with a
        focus on translating real usage problems into clearer requirements and more robust hardware decisions.
