intro:
  hello: Bocheng Zhong
  prefix: ""
  name: Technical developer and researcher
  suffix: " working across hardware, audio, sensing, and interactive systems."
  contact_label: I build prototypes, validate ideas, and turn technical concepts into usable experiences, with strengths in hardware development, system integration, and product-oriented thinking.
  email: zhongbc87@qq.com
  image:
    src: /img/featured/intro/bc-1.jpg
    alt: Portrait of Bocheng Zhong
background:
  title: Background
  paragraphs:
    - >-
      My work combines hardware development, prototyping, audio, sensing, and interactive
      experience. Audio is one of my strengths, but I am equally interested in how technical
      systems are built and shaped into real products.
    - >-
      I care about the full path from concept to implementation — from early exploration and
      prototyping to testing, iteration, and user-facing experience. My interests span hardware,
      PCB, 3D modeling, interactive design, and AI-assisted workflows, with a focus on making
      technology both functional and meaningful.
    - >-
      Related groups:
      <a class="underline-link" href="https://soundstudiesgroup.net/" target="_blank" rel="noreferrer">Sound Studies Group</a>
      and
      <a class="underline-link" href="https://www.immersivedesignresearch.com/" target="_blank" rel="noreferrer">Immersive Design Group</a>.
    - >-
      <strong>Education.</strong><br>
      Southern University of Science and Technology<br>
      M.S. in Intelligent Manufacturing and Robotics<br>
      Shenzhen, China | Sep 2023 - Jun 2026<br><br>
      Guangxi University<br>
      B.E. in Mechatronic Engineering<br>
      Nanning, China | Sep 2019 - Jun 2023
