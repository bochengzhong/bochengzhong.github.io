intro:
  hello: Hello!
  prefix: "I'm "
  name: Bocheng Zhong
  suffix: ", a hardware product manager candidate with hands-on experience in audio hardware, prototyping, validation, and turning user needs into working products"
  contact_label: Get in touch
  email: zhongbc87@qq.com
background:
  title: Background
  paragraphs:
    - >-
      I am building toward hardware product manager roles from an engineering-first foundation. At
      <a class="underline-link" href="https://www.insta360.com/" target="_blank" rel="noreferrer">Insta360</a> and
      <a class="underline-link" href="https://www.hikvision.com/" target="_blank" rel="noreferrer">Hikvision</a>, I worked on microphones,
      speakers, codecs, power amplifiers, and acoustic/mechanical integration for consumer electronics.
    - >-
      My work has ranged from component evaluation and system tuning to wind-noise investigation, microphone layout analysis,
      and validation planning across 10+ usage scenarios. I am comfortable moving between user scenarios, technical tradeoffs,
      and cross-functional iteration with mechanical and software teams.
    - >-
      Beyond internships, I have led interactive hardware prototypes that combine sensing, audio, and user testing. I enjoy
      turning ambiguous product ideas into working systems, learning from real user feedback, and pushing concepts toward
      product-worthy decisions rather than stopping at research.
