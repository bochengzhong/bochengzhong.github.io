featured_projects:
  title: 代表工作
  items:
    - class_name: hearing-material
      layout: single
      name: Hearing Material：用声音在 VR 中模拟材料触感
      url: https://doi.org/10.1109/ISMAR-Adjunct68609.2025.00127
      description: >-
        主导一套通过听觉反馈模拟材料质感的 VR 交互原型，从系统定义、原型搭建到验证设计全程推进。独立整合传感与音频子系统，
        把用户体验问题转成可验证的产品假设，并最终形成 IEEE 论文和专利成果。
      images:
        - src: /img/featured/hearing-material/teaser.png
          alt: Hearing Material 原型总览
    - class_name: audio-validation
      layout: single
      name: Insta360 相机音频硬件验证
      url: https://www.insta360.com/
      description: >-
        参与相机产品的器件评估、风噪问题分析、麦克风布局优化和 10+ 场景验证工作，在声学、结构与软件约束之间做平衡，
        以提升真实使用中的拾音表现。
      images:
        - src: /img/featured/audio-validation/recording.png
          alt: 音频硬件验证测试场景
    - class_name: flying-microphone
      layout: single
      name: 面向会议场景的轻量化飞行麦克风
      url: https://designschool.sustech.edu.cn/cn/research
      description: >-
        参与一款会议场景飞行麦克风概念验证，负责折叠翼结构设计、麦克风阵列集成和系统级调试，目标是提升演讲者与听众之间的交互灵活性。
      images:
        - src: /img/featured/flying-microphone/exhibition.jpg
          alt: 原型展示与演示现场
other_projects:
  title: 更多经验
  items:
    - name: Hikvision 消费类音频调试与集成
      url: https://www.hikvision.com/
      description: >-
        参与 10+ 类产品的麦克风、扬声器与功放选型和调试，分析频响、THD、输出能力与热表现，为声学集成和设计取舍提供依据。
      used:
        - 音频硬件
        - 系统调试
        - SoundCheck
        - Audio Precision
        - 集成验证
    - name: 面向产品决策的硬件原型开发
      url: https://www.immersivedesignresearch.com/
      description: >-
        更偏向“把想法做出来并验证”，而不是只停留在概念层。通过传感板、结构件、测试夹具和对比实验，尽早发现风险并支持产品判断。
      used:
        - 原型开发
        - 测试
        - 迭代
        - 用户验证
        - 系统集成
    - name: 跨场景硬件产品理解
      url: https://designschool.sustech.edu.cn/cn/research
      description: >-
        在消费音频、运动相机、AI 硬件以及相邻汽车场景中积累了实际问题理解，关注点始终是如何把真实使用问题转成更清晰的需求和更稳健的硬件决策。
      used:
        - 产品思维
        - 用户场景
        - 取舍判断
        - 验证
        - 协作
