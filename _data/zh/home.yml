intro:
  hello: 你好！
  prefix: "我是 "
  name: Bocheng Zhong
  suffix: "，一名硬件产品经理候选人，具备音频硬件、原型开发、验证测试，以及把用户需求落到可用产品上的实操经验"
  contact_label: 联系我
  email: zhongbc87@qq.com
background:
  title: 背景
  paragraphs:
    - >-
      我希望进入硬件产品经理方向，但我的起点并不是纯策略岗位，而是扎实的工程一线经验。在
      <a class="underline-link" href="https://www.insta360.com/" target="_blank" rel="noreferrer">Insta360</a> 和
      <a class="underline-link" href="https://www.hikvision.com/" target="_blank" rel="noreferrer">Hikvision</a>，
      我参与过麦克风、扬声器、编解码器、功放以及声学/结构集成相关工作，覆盖消费电子真实产品场景。
    - >-
      我的工作不只是在实验室做测试，还包括器件评估、系统调试、风噪问题分析、麦克风布局分析，以及面向 10+
      使用场景的验证方案制定。我习惯在用户场景、技术约束和跨团队协作之间来回切换，把问题推进到可落地的方案。
    - >-
      除了实习，我也主导过结合传感、音频和用户测试的交互硬件原型。我更喜欢把模糊的产品想法做成可运行系统，
      用真实反馈推动判断，而不是停留在“研究概念”层面。
