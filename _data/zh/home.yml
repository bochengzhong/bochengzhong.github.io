featured_projects:
  title: 精选项目
  items:
    - class_name: hearing-material
      layout: single
      name: "Hearing Material：基于动态听觉反馈的 VR 材料感知项目"
      url: https://doi.org/10.1109/ISMAR-Adjunct68609.2025.00127
      description: >-
        这是一个分两个阶段推进的项目，探索如何利用动态声音在 VR 中形成不同材料触感的错觉。项目从早期原型发展为更完整的交互系统，并产出 2 篇会议论文和 1 项中国发明专利公开。
      images:
        - src: /img/featured/hearing-material/teaser.png
          alt: Hearing Material 项目概览
    - class_name: virtual-concert
      layout: single
      name: 虚拟音乐会声场重建
      url: https://soundstudiesgroup.net/
      description: >-
        一个面向沉浸式虚拟音乐会体验的研究项目，结合多通道录音、空间音频处理与 VR 集成。
      images:
        - src: /img/featured/virtual-concert/reality-virtual.png
          alt: 虚拟音乐会与空间音频项目概览
    - class_name: wind-energy
      layout: single
      name: 基于摩擦纳米发电机的风能采集系统
      url: ""
      description: >-
        本科阶段的工程项目，围绕低功耗风能采集展开，包含结构设计、仿真与原型测试。
      images:
        - src: /img/featured/wind-energy/prototype.png
          alt: 硬件原型与测试装置
